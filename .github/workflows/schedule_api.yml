# 此工作流用于运行api（测试）分支，如果不清楚请使用 DouYin Spark Flow Schedule Run

name: 【api（测试）分支】DouYin Spark Flow Schedule Run
on:
  workflow_dispatch: # 允许手动触发
jobs:
  run-main:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: user-data
    steps:
    - uses: actions/checkout@v4
      with:
        ref: api
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Check Java Version
      run: java -version
    - name: Test Douyin Accessibility
      run: |
        curl -I https://www.douyin.com/
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Export Github Environment Variables and Secrets to JSON
      env:
        VARS_JSON: ${{ toJson(vars) }}
        SECRETS_JSON: ${{ toJson(secrets) }}
      run: python utils/export_github_env.py
    - name: Run DouYin Spark Flow
      run: python main.py
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: run-logs
        path: logs/
